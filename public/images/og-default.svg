<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080c10"/>
  <!-- Subtle gradient overlay -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#00c9a7" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#080c10" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- TODO: Replace with actual Varidian logo image -->
  <!-- Varidian wordmark placeholder -->
  <text x="600" y="255" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#eef2f7" text-anchor="middle" letter-spacing="-2">Varidian</text>

  <!-- Teal accent line -->
  <rect x="490" y="278" width="220" height="3" rx="2" fill="url(#lineGrad)"/>
  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00c9a7"/>
    <stop offset="100%" stop-color="#00a3ff"/>
  </linearGradient>

  <!-- Tagline -->
  <text x="600" y="335" font-family="Arial, sans-serif" font-size="28" fill="#8898aa" text-anchor="middle" letter-spacing="1">Software built for Zambia</text>

  <!-- Website -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="20" fill="#4a5568" text-anchor="middle" letter-spacing="2">varidianlab.com</text>
</svg>
